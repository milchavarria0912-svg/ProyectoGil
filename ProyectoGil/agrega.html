<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>Agregar Empleado</title>

<script type="module" src="js/lib/manejaErrores.js"></script>

</head>

<body>

<form id="formulario">

<h1>Agregar Empleado</h1>

<p><a href="index.html">Cancelar</a></p>

<p>
<label>
Nombre *
<input name="nombre">
</label>
</p>

<p>
<label>
Puesto *
<input name="puesto">
</label>
</p>

<p>
<label>
Horas trabajadas *
<input name="horas" type="number">
</label>
</p>

<p>
<label>
Pago *
<input name="pago" type="number" step="0.01">
</label>
</p>

<p>* Obligatorio</p>

<p><button type="submit">Agregar</button></p>

</form>

<script type="module">

import { submitAccion } from "./js/lib/submitAccion.js"

formulario.addEventListener(
"submit",
event => submitAccion(
event,
"php/empleado-agrega.php",
formulario,
"index.html"
)
)

</script>

</body>

</html>
